# Docker Compose, multi-service dev environment.
#
# Services:
#   db  : PostgreSQL 15 database. Credentials are read from the root `.env`
#         file (see `.env.example`). Data is persisted in a named volume so
#         it survives `docker-compose down`.
#   api : Python FastAPI service (docx-service) that generates Word (.docx)
#         documents from JSON payloads sent by the Next.js frontend. Runs
#         with `--reload` for live reloading during development.

version: "3.8"

services:
  # PostgreSQL database. Stores users, sessions, templates, and SOWs.
  db:
    image: postgres:15-alpine
    container_name: sow_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # Word document generation service. Receives template data via REST API
  # and returns a .docx file.
  api:
    build: ./docx-service
    container_name: sow_api
    ports:
      - "8000:8000"
    volumes:
      - ./docx-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  db_data:
